services:
  - type: web
    name: ghrce-timetable-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        sync: false          # Set this to your Neon URL in Render dashboard
      - key: SECRET_KEY
        value: ghrce-super-secret-key-change-in-production-2024
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: DEBUG
        value: false
      - key: APP_NAME
        value: GHRCE AI Timetable System
      - key: FRONTEND_URL
        value: https://frontend-inky-alpha-47.vercel.app
